<div class="clientes-page">
  <div class="clientes-page__header">
    <h1>Clientes</h1>
    <button class="btn-primary" (click)="openModal()">
      + Nuevo Cliente
    </button>
  </div>

  <div class="clientes-table-wrapper">
    <table class="clientes-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let cliente of clientes; let i = index">
          <td>{{ cliente.nombre }}</td>
          <td>{{ cliente.dni }}</td>
          <td>
            <span class="status status--active">
              {{ cliente.estado }}
            </span>
          </td>
          <td>
            <button class="btn-secondary" (click)="editarCliente(cliente, i)">Editar</button>

            <button class="btn-danger" (click)="eliminarCliente(i)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal">
      <h2>{{ modoEdicion ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>

      <form [formGroup]="clienteForm" (ngSubmit)="guardarCliente()">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="nombre" placeholder="Nombre del cliente" />

          <small
            class="error"
            *ngIf="clienteForm.get('nombre')?.invalid && clienteForm.get('nombre')?.touched"
          >
            El nombre es obligatorio
          </small>
        </div>

        <div class="form-group">
          <label>DNI</label>
          <input type="text" formControlName="dni" placeholder="DNI del cliente" />

          <small
            class="error"
            *ngIf="clienteForm.get('dni')?.invalid && clienteForm.get('dni')?.touched"
          >
            El DNI es obligatorio
          </small>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select formControlName="estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" (click)="closeModal()">
            Cancelar
          </button>

          <button type="submit" class="btn-primary">
  {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
</button>
        </div>
      </form>
    </div>
  </div>
</div>
